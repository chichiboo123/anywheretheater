<!doctype html>
<html><head><meta charset="utf-8"><style>body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Noto Sans KR', Arial, sans-serif;
  padding: 20px;
  background: #eaf3ff;
  text-align: center;
}
h1{ color:#1e40af }
button{
  background:#2563eb; color:white; border:0; padding:10px 18px; border-radius:10px;
}
button:hover{ filter:brightness(.95) }</style></head>
<body><!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어디서나 공연장 - Anywhere Theater</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Do+Hyeon&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --header-bg: #121212;
            --primary-color: #d4af37; --primary-text: #000000;
            --text-color: #f1f1f1; --text-muted: #b0b0b0; --border-color: #333;
            --shadow-color: rgba(0,0,0,0.5);
            --font-main: 'Pretendard GOV', 'Pretendard', sans-serif; 
            --font-head: 'Jua', sans-serif; --font-title: 'Do Hyeon', sans-serif;
            --radius: 4px; --modal-bg: #1e1e1e; --overlay-bg: rgba(0,0,0,0.85); --modal-shadow: 0 10px 40px rgba(0,0,0,0.5);
            --curtain-width: 80px; --stage-padding: 100px;
        }

        body.light-theme {
            --bg-color: #fff9e6; --card-bg: #ffffff; --header-bg: #ffffff;
            --primary-color: #ff7675; --primary-text: #ffffff;
            --text-color: #2d3436; --text-muted: #636e72; --border-color: #ffeaa7;
            --shadow-color: rgba(255, 118, 117, 0.2);
            --radius: 20px; --modal-bg: #ffffff; --overlay-bg: rgba(255, 255, 255, 0.6); --modal-shadow: 0 10px 40px rgba(255, 118, 117, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s; }
        body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; overflow-x: hidden; }
        h1 { font-family: var(--font-title); } h2, h3, .btn, .year-card h2, .group-badge { font-family: var(--font-head); }
        a { text-decoration: none; color: inherit; } ul { list-style: none; } button { font-family: inherit; }

        .top-bar { display: flex; justify-content: flex-end; padding: 1rem var(--stage-padding); gap: 10px; position: absolute; top: 0; left: 0; right: 0; z-index: 100; }
        .util-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-color); padding: 6px 14px; border-radius: 50px; font-size: 0.85rem; cursor: pointer; backdrop-filter: blur(4px); }
        .util-btn:hover { background: var(--primary-color); color: var(--primary-text); border-color: var(--primary-color); }
        .util-btn.highlight { border-color: var(--primary-color); color: var(--primary-color); font-weight: bold; }
        .util-btn.highlight:hover { background: var(--primary-color); color: var(--primary-text); }
        body.light-theme .util-btn { background: white; border: 2px solid var(--primary-color); color: var(--primary-color); font-weight: bold; }

        header { padding: 4rem var(--stage-padding) 2rem; text-align: center; background: var(--header-bg); border-bottom: 1px solid var(--border-color); }
        header h1 { font-size: 3rem; color: var(--primary-color); letter-spacing: 1px; margin-bottom: 0.5rem; cursor: pointer; transition: transform 0.2s; display: inline-block; }
        header h1:hover { transform: scale(1.02); } header p { font-size: 1.1rem; color: var(--text-muted); }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem var(--stage-padding) 5rem; min-height: 70vh; }

        /* 검색창 확장 유지 */
        .global-search-wrapper { max-width: 700px; width: 100%; margin: 2rem auto 4rem; position: relative; z-index: 50; }
        .global-search-input { width: 100%; padding: 1rem 1.8rem; border-radius: 50px; border: 2px solid var(--border-color); background: var(--card-bg); color: var(--text-color); font-size: 1rem; box-shadow: 0 4px 15px var(--shadow-color); outline: none; }
        .global-search-input::placeholder { font-size: 1rem; color: var(--text-muted); }
        .global-search-input:focus { border-color: var(--primary-color); transform: scale(1.02); }

        #yearSelectionScreen { display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.8s ease-out; }
        .year-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; width: 100%; max-width: 1000px; }
        .year-card { background: var(--card-bg); border: 2px solid var(--border-color); padding: 2.5rem 1rem; text-align: center; border-radius: var(--radius); cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 4px 10px var(--shadow-color); width: 100%; max-width: 280px; }
        .year-card:hover { transform: translateY(-8px); border-color: var(--primary-color); }
        .year-card h2 { font-size: 2.2rem; color: var(--text-color); margin-bottom: 0.5rem; }
        .year-card span { font-size: 0.9rem; color: var(--text-muted); }

        #galleryScreen { display: none; animation: fadeIn 0.5s ease-out; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 1rem; }
        .back-btn { background: none; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 0.5rem 1.2rem; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .back-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 10px var(--shadow-color); cursor: pointer; border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px var(--shadow-color); }
        .poster-area { height: 350px; background-color: #333; background-size: cover; background-position: center; position: relative; }
        .group-badge { position: absolute; top: 10px; right: 10px; background: var(--primary-color); color: var(--primary-text); padding: 5px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .lock-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 8px; border-radius: 50%; font-size: 1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 5; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; color: white; opacity: 0.8; text-shadow: 0 2px 10px black; }
        .card:hover .play-icon { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        .card-body { padding: 1.5rem; text-align: left; } 
        .card-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 0.5rem; color: var(--text-color); line-height: 1.3; }
        .card-meta { font-size: 1rem; color: var(--text-muted); }

        footer { text-align: center; padding: 3rem var(--stage-padding); border-top: 1px solid var(--border-color); margin-top: auto; color: var(--text-muted); font-size: 0.9rem; }
        .creator-link:hover { color: var(--primary-color); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(8px); }
        .modal-content { background: var(--modal-bg); color: var(--text-color); width: 100%; max-width: 900px; max-height: 90vh; border-radius: var(--radius); overflow-y: auto; position: relative; box-shadow: var(--modal-shadow); border: 1px solid var(--border-color); }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .close-btn { background: none; border: none; font-size: 2rem; cursor: pointer; color: var(--text-muted); }
        .close-btn:hover { color: var(--primary-color); }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: black; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info-section { padding: 2rem; display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; text-align: left; }

        /* 모바일 반응형 유지 */
        @media (max-width: 768px) { 
            .info-section { grid-template-columns: 1fr; } .year-card { max-width: 100%; } 
            :root { --curtain-width: 25px; --stage-padding: 30px; }
            .curtain-fold { width: 8px; } .curtain-left .curtain-fold { right: 8px; } .curtain-right .curtain-fold { left: 8px; } .curtain-tassel { display: none; }
            header h1 { font-size: 2.2rem; } 
            .top-bar { justify-content: center; flex-wrap: wrap; gap: 8px; padding: 1rem 10px; }
            .util-btn { padding: 6px 12px; font-size: 0.8rem; }
            .global-search-wrapper { max-width: 100%; width: 100%; margin: 1rem auto 2.5rem; padding: 0 10px; } 
            .global-search-input { padding: 0.9rem 1.4rem; font-size: 0.9rem; }
            .global-search-input::placeholder { font-size: 0.9rem; }
            .year-card h2 { font-size: 1.8rem; } .gallery { grid-template-columns: 1fr; gap: 1.5rem; }
            .modal-content { max-height: 95vh; border-radius: 12px; }
        }

        @media (max-width: 480px) {
            :root { --curtain-width: 15px; --stage-padding: 20px; }
            header h1 { font-size: 1.8rem; }
            header p { font-size: 0.95rem; }
            .top-bar { gap: 6px; }
            .util-btn { padding: 5px 10px; font-size: 0.75rem; }
            .global-search-input { padding: 0.8rem 1.2rem; font-size: 0.8rem; }
            .global-search-input::placeholder { font-size: 0.8rem; }
            .year-grid { gap: 1rem; }
            .poster-area { height: 250px; }
            .info-section { padding: 1.5rem 1rem; }
        }

        .label { color: var(--primary-color); font-weight: bold; margin-bottom: 0.5rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .text-content { margin-bottom: 1.5rem; white-space: pre-line; color: var(--text-color); font-size: 1.05rem; text-align: left; }
        .track-list li { padding: 0.5rem 0; border-bottom: 1px dashed var(--border-color); color: var(--text-color); }
        .track-list li::before { content: '\266A '; color: var(--primary-color); margin-right: 5px; }

        .hashtag-btn { background: var(--primary-color); color: var(--primary-text); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; border: none; transition: transform 0.2s; }
        .hashtag-btn:hover { transform: scale(1.1); font-weight: bold; }

        .curtain-left, .curtain-right { position: fixed; top: 0; width: var(--curtain-width); height: 100%; z-index: 10; pointer-events: none; }
        .curtain-left { left: 0; background: linear-gradient(to right, #8B0000 0%, #A52A2A 20%, #8B0000 40%, #6B0000 60%, #8B0000 80%, transparent 100%); }
        .curtain-right { right: 0; background: linear-gradient(to left, #8B0000 0%, #A52A2A 20%, #8B0000 40%, #6B0000 60%, #8B0000 80%, transparent 100%); }
        .curtain-fold { position: absolute; top: 0; width: 15px; height: 100%; background: linear-gradient(to bottom, #6B0000 0%, #8B0000 50%, #6B0000 100%); }
        .curtain-tassel { position: absolute; top: 20%; width: 20px; height: 60px; } .curtain-left .curtain-tassel { right: 5px; } .curtain-right .curtain-tassel { left: 5px; }
        .curtain-tassel::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #d4af37; border-radius: 50%; }
        .curtain-tassel::after { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 8px; height: 45px; background: #d4af37; border-radius: 0 0 4px 4px; }
        body.light-theme .curtain-left { background: linear-gradient(to right, #ff6b6b 0%, #ff8787 20%, #ff6b6b 40%, #ee5a5a 60%, #ff6b6b 80%, transparent 100%); }
        body.light-theme .curtain-right { background: linear-gradient(to left, #ff6b6b 0%, #ff8787 20%, #ff6b6b 40%, #ee5a5a 60%, #ff6b6b 80%, transparent 100%); }
        body.light-theme .curtain-fold { background: linear-gradient(to bottom, #ee5a5a 0%, #ff6b6b 50%, #ee5a5a 100%); }
        body.light-theme .curtain-tassel::before { background: #ffd93d; } body.light-theme .curtain-tassel::after { background: #ffd93d; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="curtain-left"><div class="curtain-fold"></div><div class="curtain-tassel"></div></div>
    <div class="curtain-right"><div class="curtain-fold"></div><div class="curtain-tassel"></div></div>

    <div class="top-bar">
        <button class="util-btn highlight" onclick="openSubmissionModal()" id="btnSubmit" data-key="btnSubmit">작품제출</button>
        <button class="util-btn" onclick="toggleTheme()" id="btnTheme">Light Mode</button>
        <button class="util-btn" onclick="toggleLang()" id="btnLang">English</button>
    </div>

    <header>
        <h1 data-key="title" onclick="goHome()">어디서나 공연장</h1>
        <p data-key="subtitle">우리들의 온라인 극장</p>
    </header>

    <div class="container">
        <div id="yearSelectionScreen">
            <div class="global-search-wrapper">
                <input type="text" class="global-search-input" id="globalSearch" placeholder="작품명, 선생님, 학급명 검색" onkeydown="if(event.key==='Enter') performGlobalSearch()">
            </div>
            <h2 style="color:var(--text-muted); margin-bottom: 1.5rem;" data-key="selectYear">관람하실 연도를 선택하세요</h2>
            <div class="year-grid" id="yearGridContainer"></div>
            <div id="totalWorksCounter" style="margin-top: 3rem; text-align: center; padding: 1.5rem; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border-color); max-width: 400px;">
                <div style="font-size: 3rem; color: var(--primary-color); font-family: var(--font-title); line-height: 1;"><span id="totalWorksNumber">0</span></div>
                <div style="font-size: 1rem; color: var(--text-muted); margin-top: 0.5rem;" data-key="totalWorks">작품이 무대에 올랐습니다</div>
            </div>
        </div>

        <div id="galleryScreen">
            <div class="nav-bar">
                <button class="back-btn" onclick="goHome()" data-key="backBtn">연도 다시 선택하기</button>
                <div class="current-year-display" id="yearTitle" style="font-size:1.5rem; font-weight:bold;">2024</div>
            </div>
            <div style="margin-bottom: 2rem;">
                <input type="text" id="localSearch" class="global-search-input" style="padding: 0.8rem 1.5rem; font-size:1rem;" placeholder="이 연도 내에서 검색..." onkeyup="filterPerformances()">
            </div>
            <div class="gallery" id="galleryGrid"></div>
        </div>
    </div>

    <footer>
        <a href="https://litt.ly/chichiboo" target="_blank" class="creator-link">created by. <span data-key="creator">교육뮤지컬 꿈꾸는 치수쌤</span></a>
    </footer>

    <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="video-wrapper" id="videoWrapper"><iframe id="modalVideo" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
            <div class="modal-header">
                <div><h2 id="modalTitle" style="color:var(--primary-color);"></h2><span id="modalGroup" style="font-size:0.9rem; color:var(--text-muted);"></span></div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="info-section">
                <div>
                    <div class="label" data-key="synopsis">줄거리</div>
                    <p id="modalSynopsis" class="text-content"></p>
                    <div style="margin-top: 1rem; display: flex; align-items: baseline; gap: 8px;">
                        <span class="label" data-key="director" style="margin-bottom:0;">지도 교사/강사</span>
                        <span id="modalTeacher" class="text-content" style="margin-bottom:0; font-weight:bold;"></span>
                    </div>
                </div>
                <div>
                    <div class="label" data-key="numbers">뮤지컬 넘버</div>
                    <ul id="modalNumbers" class="track-list"></ul>
                    <div id="modalMaterialsSection" style="margin-top: 1.5rem;"><div class="label" data-key="materials">수업자료</div><ul id="modalMaterials" class="track-list"></ul></div>
                    <div id="modalHashtagsSection" style="margin-top: 1.5rem;"><div class="label" data-key="hashtags">해시태그</div><div id="modalHashtags" style="display: flex; flex-wrap: wrap; gap: 8px;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxsBnmfttt17B8QAvGg7vEwvs19uInx06yRVS1YMIPu3VppGG6eV_VRE20r3rS5bNVB7g/exec";
        
        let database = {};
        let currentLang = 'ko';
        let currentYear = "";
        let currentData = [];
        let openModalId = null; 
        let openModalYear = null;

        // ★ noMaterials 문구를 영어 모드일 때 "No records found."로 변경 완료
        const i18n = {
            ko: { title: "어디서나 공연장", subtitle: "우리들의 온라인 극장", selectYear: "관람하실 연도를 선택하세요", viewArchive: "작품 보러가기", backBtn: "연도 다시 선택하기", creator: "교육뮤지컬 꿈꾸는 치수쌤", synopsis: "줄거리", director: "지도 교사/강사", numbers: "뮤지컬 넘버", searchPlaceholder: "작품명, 선생님, 학급명 검색 (입력 후 엔터)", localSearchPlaceholder: "이 연도 내에서 검색...", btnTheme: "Light Mode", btnLang: "English", btnSubmit: "작품제출", emptyState: "아직 등록된 작품이 없습니다.", materials: "수업자료", hashtags: "해시태그", totalWorks: "작품이 무대에 올랐습니다", pwPrompt: "이 작품은 비밀번호가 필요합니다.", pwError: "비밀번호가 일치하지 않습니다.", pwBtn: "확인", noMaterials: "등록된 자료가 없습니다.", searchResult: "검색 결과" },
            en: { title: "Anywhere Theater", subtitle: "Our Online Theater", selectYear: "Select Year to Watch", viewArchive: "View Archive", backBtn: "Select Year", creator: "Chisu-Saem Edu&Musical", synopsis: "Synopsis", director: "Director / Teacher", numbers: "Musical Numbers", searchPlaceholder: "Search (Press Enter)", localSearchPlaceholder: "Search in this year...", btnTheme: "Dark Mode", btnLang: "한국어", btnSubmit: "Submit Video", emptyState: "No performances registered yet.", materials: "Class Materials", hashtags: "Hashtags", totalWorks: "performances on stage", pwPrompt: "This content requires a password.", pwError: "Incorrect password.", pwBtn: "Confirm", noMaterials: "No records found.", searchResult: "Search Results" }
        };

        function openSubmissionModal() { 
            window.open("https://docs.google.com/forms/d/e/1FAIpQLSc5sc-dngAFre6i6XtYPikHtOoFd3TNOUKwmg1S0Om_YRl6QA/viewform?usp=dialog", "_blank"); 
        }

        async function loadDataFromSheet() {
            try {
                const response = await fetch(API_URL);
                const rawData = await response.json();
                database = {};
                
                // ★ 영어 번역("None", "N/A" 등)까지 모두 걸러내는 완벽 방어 필터 적용
                const splitToArray = (str) => {
                    if (!str) return [];
                    const cleanStr = String(str).trim().toLowerCase();
                    // 구글 번역이 만들어내는 의미 없는 텍스트들을 원천 차단
                    if (cleanStr === "" || cleanStr === "없음" || cleanStr === "none" || cleanStr === "n/a" || cleanStr === "-" || cleanStr === "x") return [];
                    
                    return String(str).split(',').map(s => s.trim()).filter(s => {
                        const lower = s.toLowerCase();
                        return lower && lower !== "none" && lower !== "없음" && lower !== "-" && lower !== "n/a" && lower !== "x";
                    });
                };

                rawData.forEach(item => {
                    const year = item.year ? String(item.year).trim() : "기타";
                    if (!database[year]) database[year] = [];
                    database[year].push({
                        id: String(item.id || Date.now() + Math.random()), 
                        title: { ko: String(item.title || ""), en: String(item.titleEn || item.title || "") },
                        group: { ko: String(item.group || ""), en: String(item.groupEn || item.group || "") },
                        teacher: { ko: String(item.teacher || ""), en: String(item.teacherEn || item.teacher || "") },
                        synopsis: { ko: String(item.synopsis || ""), en: String(item.synopsisEn || item.synopsis || "") },
                        numbers: { ko: splitToArray(item.numbers), en: splitToArray(item.numbersEn || item.numbers) },
                        hashtags: { ko: splitToArray(item.hashtags), en: splitToArray(item.hashtagsEn || item.hashtags) },
                        materials: { ko: splitToArray(item.materials), en: splitToArray(item.materialsEn || item.materials) },
                        videoUrl: item.videoUrl, poster: item.poster, password: item.password
                    });
                });
                renderYearCards();
                updateTotalWorksCount();
            } catch (error) { console.error("데이터 로딩 실패", error); }
        }

        function renderYearCards() {
            const container = document.getElementById('yearGridContainer');
            container.innerHTML = '';
            const years = Object.keys(database).sort((a, b) => a - b);
            years.forEach(year => {
                const card = document.createElement('div');
                card.className = 'year-card';
                card.onclick = () => selectYear(year);
                card.innerHTML = `<h2>${year}</h2><span data-key="viewArchive">${i18n[currentLang].viewArchive}</span>`;
                container.appendChild(card);
            });
        }

        function performGlobalSearch(forcedQuery = "") {
            const query = (forcedQuery || document.getElementById('globalSearch').value).toLowerCase().trim();
            if (query.length < 1) return;

            let results = [];
            Object.keys(database).forEach(year => {
                database[year].forEach(item => {
                    const isMatch = [
                        item.title.ko, item.title.en, 
                        item.teacher.ko, item.teacher.en, 
                        item.group.ko, item.group.en
                    ].some(val => String(val).toLowerCase().includes(query)) ||
                    item.hashtags.ko.some(tag => String(tag).toLowerCase().includes(query)) ||
                    item.hashtags.en.some(tag => String(tag).toLowerCase().includes(query));

                    if (isMatch) results.push({ ...item, year: year }); 
                });
            });

            document.getElementById('yearSelectionScreen').style.display = 'none';
            document.getElementById('galleryScreen').style.display = 'block';
            document.getElementById('yearTitle').innerText = `${i18n[currentLang].searchResult}: ${query}`;
            currentYear = "Search";
            currentData = results;
            renderGallery(results);
        }

        function searchByHashtag(tag) {
            closeModal();
            document.getElementById('globalSearch').value = tag;
            performGlobalSearch(tag);
        }

        function renderGallery(data) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            if (data.length === 0) {
                grid.innerHTML = `<div class="empty-state"><p>${i18n[currentLang].emptyState}</p></div>`;
                return;
            }
            data.forEach(item => {
                const posterStyle = item.poster ? `background-image: url('${item.poster}');` : `background: linear-gradient(135deg, #444, #222);`;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetail(String(item.id), String(item.year || currentYear));
                card.innerHTML = `
                    <div class="poster-area" style="${posterStyle}">
                        ${item.password ? `<div class="lock-badge">🔒</div>` : ''}
                        <div class="group-badge">${item.group[currentLang]}</div>
                        <div class="play-icon">▶</div>
                    </div>
                    <div class="card-body">
                        <div class="card-title">${item.title[currentLang]}</div>
                        <div class="card-meta">🎓 ${item.teacher[currentLang]}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function convertToEmbedUrl(url) {
            if (!url) return null;
            let videoId = null;
            if (url.includes('youtu.be/')) { const match = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if (match) videoId = match[1]; }
            else if (url.includes('youtube.com/watch')) { const match = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/); if (match) videoId = match[1]; }
            else if (url.includes('youtube.com/embed/')) { const match = url.match(/embed\/([a-zA-Z0-9_-]{11})/); if (match) videoId = match[1]; }
            else if (url.includes('youtube.com/shorts/')) { const match = url.match(/shorts\/([a-zA-Z0-9_-]{11})/); if (match) videoId = match[1]; }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        }

        function openDetail(id, year) {
            try {
                const list = (year === "Search" || year === "Search Results") ? currentData : (database[year] || []);
                const item = list.find(p => String(p.id) === String(id));
                if (!item) return; 

                openModalId = id; openModalYear = year;
                document.getElementById('modalTitle').innerText = item.title[currentLang];
                document.getElementById('modalGroup').innerText = item.group[currentLang];
                document.getElementById('modalTeacher').innerText = item.teacher[currentLang];
                document.getElementById('modalSynopsis').innerText = item.synopsis[currentLang];

                const ul = document.getElementById('modalNumbers'); ul.innerHTML = '';
                (item.numbers[currentLang] || []).forEach(n => { const li = document.createElement('li'); li.textContent = n; ul.appendChild(li); });

                const materialsUl = document.getElementById('modalMaterials'); materialsUl.innerHTML = '';
                if (item.materials[currentLang] && item.materials[currentLang].length > 0) {
                    item.materials[currentLang].forEach(mat => {
                        const li = document.createElement('li'); li.innerHTML = `<a href="${mat}" target="_blank" style="color:var(--primary-color); text-decoration:underline;">Link</a>`; materialsUl.appendChild(li);
                    });
                } else { materialsUl.innerHTML = `<li style="border:none; color:var(--text-muted); font-size:0.9rem;">${i18n[currentLang].noMaterials}</li>`; }

                const hashtagsDiv = document.getElementById('modalHashtags'); hashtagsDiv.innerHTML = '';
                if (item.hashtags[currentLang] && item.hashtags[currentLang].length > 0) {
                    item.hashtags[currentLang].forEach(tag => {
                        const btn = document.createElement('button'); btn.className = 'hashtag-btn'; btn.textContent = '#' + tag; btn.onclick = () => searchByHashtag(tag); hashtagsDiv.appendChild(btn);
                    });
                } else { hashtagsDiv.innerHTML = `<span style="color:var(--text-muted); font-size:0.9rem;">-</span>`; }

                const videoWrapper = document.getElementById('videoWrapper');
                const videoFrame = document.getElementById('modalVideo');
                const embedUrl = convertToEmbedUrl(item.videoUrl);
                const existingOverlay = document.getElementById('pwOverlay'); if (existingOverlay) existingOverlay.remove();

                if (item.password && String(item.password).trim() !== "") {
                    videoFrame.style.display = 'none';
                    const pwOverlay = document.createElement('div'); pwOverlay.id = 'pwOverlay'; pwOverlay.style.cssText = `position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 10;`;
                    pwOverlay.innerHTML = `<div style="font-size: 3rem; margin-bottom: 1rem;">🔒</div><p style="margin-bottom: 1.5rem;">${i18n[currentLang].pwPrompt}</p><div style="display: flex; gap: 8px;"><input type="password" id="pwInput" style="padding: 10px; border-radius: 4px; border: 1px solid #555; background: #222; color: white;"><button id="pwSubmitBtn" style="padding: 10px 20px; background: var(--primary-color); border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">${i18n[currentLang].pwBtn}</button></div><p id="pwError" style="color: #ff6b6b; margin-top: 10px; display: none;">${i18n[currentLang].pwError}</p>`;
                    videoWrapper.appendChild(pwOverlay);
                    const checkPassword = () => {
                        if (document.getElementById('pwInput').value === String(item.password)) { pwOverlay.remove(); videoFrame.style.display = 'block'; if (embedUrl) videoFrame.src = embedUrl + '?autoplay=1&rel=0'; } 
                        else { document.getElementById('pwError').style.display = 'block'; }
                    };
                    document.getElementById('pwSubmitBtn').onclick = checkPassword;
                    document.getElementById('pwInput').onkeydown = (e) => { if (e.key === 'Enter') checkPassword(); };
                } else {
                    videoFrame.style.display = 'block'; if (embedUrl) videoFrame.src = embedUrl + '?autoplay=1&rel=0'; else videoFrame.src = '';
                }
                document.getElementById('detailModal').style.display = 'flex'; document.body.style.overflow = 'hidden';
            } catch (err) { console.error("팝업 오류: ", err); }
        }

        function closeModal(e) {
            if (e && e.target !== document.getElementById('detailModal') && !e.target.classList.contains('close-btn')) return;
            document.getElementById('detailModal').style.display = 'none'; document.getElementById('modalVideo').src = ''; document.body.style.overflow = '';
            openModalId = null; openModalYear = null;
        }

        function selectYear(year) {
            currentYear = year; currentData = database[year] || [];
            document.getElementById('yearSelectionScreen').style.display = 'none'; document.getElementById('galleryScreen').style.display = 'block';
            document.getElementById('yearTitle').innerText = year; renderGallery(currentData);
        }

        function goHome() {
            document.getElementById('galleryScreen').style.display = 'none'; document.getElementById('yearSelectionScreen').style.display = 'flex';
            document.getElementById('globalSearch').value = ''; currentYear = "";
        }

        function filterPerformances() {
            const query = document.getElementById('localSearch').value.toLowerCase().trim();
            const filtered = currentData.filter(item => 
                String(item.title[currentLang]).toLowerCase().includes(query) || 
                String(item.group[currentLang]).toLowerCase().includes(query) || 
                String(item.teacher[currentLang]).toLowerCase().includes(query)
            );
            renderGallery(filtered);
        }

        function toggleTheme() { document.body.classList.toggle('light-theme'); const isLight = document.body.classList.contains('light-theme'); document.getElementById('btnTheme').innerText = isLight ? "Dark Mode" : "Light Mode"; }

        function toggleLang() {
            currentLang = currentLang === 'ko' ? 'en' : 'ko'; updateTexts();
            document.getElementById('btnLang').innerText = i18n[currentLang].btnLang;
            if (document.getElementById('galleryScreen').style.display === 'block') { if(currentYear === "Search") performGlobalSearch(document.getElementById('globalSearch').value); else filterPerformances(); }
            if (document.getElementById('detailModal').style.display === 'flex' && openModalId) openDetail(openModalId, openModalYear);
        }

        function updateTexts() {
            const texts = i18n[currentLang];
            document.querySelectorAll('[data-key]').forEach(el => { const key = el.getAttribute('data-key'); if (texts[key]) el.innerText = texts[key]; });
            document.getElementById('globalSearch').placeholder = texts.searchPlaceholder;
        }

        function updateTotalWorksCount() {
            let total = 0; Object.keys(database).forEach(y => total += database[y].length);
            const counter = document.getElementById('totalWorksNumber');
            if (counter) {
                let current = 0; const steps = 60; const increment = total / steps;
                const animate = () => { current += increment; if (current >= total) counter.textContent = total; else { counter.textContent = Math.floor(current); setTimeout(animate, 1500/steps); } };
                animate();
            }
        }
        window.onload = () => { updateTexts(); loadDataFromSheet(); };
    </script>
</body>

  document.body.appendChild(box);
}
